name: "signal-lens"
description: "Context-first maintainer PR review — CI weakening, security boundaries, duplicate utilities"
author: "Signal Lens contributors"
branding:
  icon: "search"
  color: "blue"

inputs:
  base:
    description: "Base git ref for comparison"
    required: false
    default: "${{ github.event.pull_request.base.sha }}"
  head:
    description: "Head git ref for comparison"
    required: false
    default: "${{ github.event.pull_request.head.sha }}"
  output-format:
    description: "Output format: markdown, json, sarif, both, or all"
    required: false
    default: "all"
  output-file:
    description: "Base path for review output (extensions added per format)"
    required: false
    default: "signal-lens-report"
  post-comment:
    description: "Post review as PR comment (requires write permissions in separate job)"
    required: false
    default: "false"
  post-inline-comments:
    description: "Post inline comments on specific lines (findings with file+line evidence)"
    required: false
    default: "false"
  apply-labels:
    description: "Apply signal-lens:* labels to the PR based on findings (requires issues: write permission)"
    required: false
    default: "false"
  notify-webhook:
    description: "Slack/Discord webhook URL to send finding summaries (notified only on blocker/high findings)"
    required: false
    default: ""
  fail-on-blocker:
    description: "Fail the review step when blocker findings are detected"
    required: false
    default: "true"
  github-token:
    description: "GitHub token for posting comments"
    required: false
    default: "${{ github.token }}"
  upload-sarif:
    description: "Upload SARIF results to GitHub Code Scanning (requires security-events: write permission)"
    required: false
    default: "false"

outputs:
  report-path:
    description: "Path to the generated markdown report"
    value: ${{ steps.review.outputs.report-path }}
  sarif-path:
    description: "Path to SARIF output"
    value: ${{ steps.review.outputs.sarif-path }}
  finding-count:
    description: "Total number of findings"
    value: ${{ steps.review.outputs.finding-count }}
  has-blocker:
    description: "Whether any blocker findings were detected"
    value: ${{ steps.review.outputs.has-blocker }}

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install signal-lens
      shell: bash
      run: npm install -g signal-lens@2.2.0 || npm install -g .

    - name: Index repository symbols
      shell: bash
      run: signal-lens index --repo "$GITHUB_WORKSPACE" || true

    - name: Run review (read-only)
      id: review
      shell: bash
      env:
        BASE_REF: ${{ inputs.base }}
        HEAD_REF: ${{ inputs.head }}
        OUTPUT_FORMAT: ${{ inputs.output-format }}
        OUTPUT_FILE: ${{ inputs.output-file }}
        FAIL_ON_BLOCKER: ${{ inputs.fail-on-blocker }}
      run: |
        set +e
        signal-lens review \
          --base "$BASE_REF" \
          --head "$HEAD_REF" \
          --output "$OUTPUT_FORMAT" \
          --output-file "$OUTPUT_FILE" \
          --static-only
        REVIEW_EXIT=$?

        JSON_PATH="${OUTPUT_FILE}.json"
        if [ "$OUTPUT_FORMAT" = "json" ]; then JSON_PATH="$OUTPUT_FILE"; fi

        export JSON_PATH="$JSON_PATH"
        FINDING_COUNT=$(node -e "
          const fs=require('fs');
          const p=process.env.JSON_PATH;
          if(!fs.existsSync(p)){console.log('0');process.exit(0)}
          console.log(JSON.parse(fs.readFileSync(p,'utf8')).findings.length);
        ")

        HAS_BLOCKER=$(node -e "
          const fs=require('fs');
          const p=process.env.JSON_PATH;
          if(!fs.existsSync(p)){console.log('false');process.exit(0)}
          const r=JSON.parse(fs.readFileSync(p,'utf8'));
          console.log(r.findings.some(f=>f.severity==='blocker')?'true':'false');
        ")

        echo "report-path=${OUTPUT_FILE}.md" >> "$GITHUB_OUTPUT"
        echo "sarif-path=${OUTPUT_FILE}.sarif" >> "$GITHUB_OUTPUT"
        echo "finding-count=$FINDING_COUNT" >> "$GITHUB_OUTPUT"
        echo "has-blocker=$HAS_BLOCKER" >> "$GITHUB_OUTPUT"

        if [ "$FAIL_ON_BLOCKER" = "true" ] && [ "$HAS_BLOCKER" = "true" ]; then
          exit 1
        fi
        exit 0

    - name: Post PR comment
      if: inputs.post-comment == 'true' && github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        REPORT_FILE: ${{ inputs.output-file }}.md
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const report = fs.readFileSync(process.env.REPORT_FILE, 'utf8');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: report
          });

    - name: Post inline PR comments
      if: inputs.post-inline-comments == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        JSON_PATH: ${{ inputs.output-file }}.json
        HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        if [ ! -f "$JSON_PATH" ]; then
          echo "No JSON report at $JSON_PATH — skipping inline comments"
          exit 0
        fi
        signal-lens post-inline \
          --owner "${{ github.repository_owner }}" \
          --github-repo "${{ github.event.repository.name }}" \
          --pr "${{ github.event.pull_request.number }}" \
          --commit "$HEAD_SHA" \
          --report-file "$JSON_PATH"

    - name: Upload SARIF to Code Scanning
      if: inputs.upload-sarif == 'true' && always()
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output-file }}.sarif
        category: signal-lens

    - name: Apply PR labels
      if: inputs.apply-labels == 'true' && github.event_name == 'pull_request'
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        JSON_PATH: ${{ inputs.output-file }}.json
      run: |
        if [ ! -f "$JSON_PATH" ]; then
          echo "No JSON report at $JSON_PATH — skipping labels"
          exit 0
        fi
        signal-lens label \
          --owner "${{ github.repository_owner }}" \
          --github-repo "${{ github.event.repository.name }}" \
          --pr "${{ github.event.pull_request.number }}" \
          --report-file "$JSON_PATH"

    - name: Notify webhook
      if: inputs.notify-webhook != '' && github.event_name == 'pull_request'
      shell: bash
      env:
        SIGNAL_LENS_WEBHOOK_URL: ${{ inputs.notify-webhook }}
        JSON_PATH: ${{ inputs.output-file }}.json
      run: |
        if [ ! -f "$JSON_PATH" ]; then
          echo "No JSON report — skipping webhook"
          exit 0
        fi
        node -e "
          const fs = require('fs');
          const r = JSON.parse(fs.readFileSync(process.env.JSON_PATH, 'utf8'));
          const hasBH = r.findings.some(f => f.severity === 'blocker' || f.severity === 'high');
          if (!hasBH) { console.log('No blocker/high findings — skipping webhook'); process.exit(0); }
          const url = process.env.SIGNAL_LENS_WEBHOOK_URL;
          const isSlack = url.includes('hooks.slack.com');
          const risk = r.findings.some(f => f.severity === 'blocker') ? '🔴 Blocker' : '🟠 High';
          const top = r.findings.slice(0, 5).map(f => '[' + f.severity.toUpperCase() + '] ' + f.title);
          const body = isSlack
            ? { blocks: [
                { type: 'header', text: { type: 'plain_text', text: 'Signal Lens: ' + risk } },
                { type: 'section', text: { type: 'mrkdwn', text: top.map(t => '• ' + t).join('\n') } }
              ]}
            : { embeds: [{ title: 'Signal Lens: ' + risk, color: 0xe74c3c, description: top.map(t => '• ' + t).join('\n') }] };
          fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
            .then(res => { if (!res.ok) process.exit(1); console.log('Webhook sent'); })
            .catch(() => process.exit(1));
        "