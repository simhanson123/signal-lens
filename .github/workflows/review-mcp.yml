# Example workflow for consuming repositories.
# Copy to your repo as .github/workflows/review-mcp.yml

name: review-mcp PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    # Do not run on fork PRs with secrets (security best practice)
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run review-mcp
        uses: review-mcp/review-mcp/action.yml@v0.1.0
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output-format: both
          output-file: review-mcp-report.md
          post-comment: "true"
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload review artifact
        uses: actions/upload-artifact@v4
        with:
          name: review-mcp-report
          path: |
            review-mcp-report.md
            review-mcp-report.json