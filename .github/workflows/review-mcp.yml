name: review-mcp PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run review-mcp (read-only analysis)
        uses: simhanson123/review-mcp/action.yml@v1.0.0
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output-format: all
          output-file: review-mcp-report
          post-comment: "true"
          fail-on-blocker: "true"

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: review-mcp-report.sarif
          category: review-mcp

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: review-mcp-report
          path: |
            review-mcp-report.md
            review-mcp-report.json
            review-mcp-report.sarif