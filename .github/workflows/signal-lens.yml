name: signal-lens PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run signal-lens (read-only analysis)
        uses: simhanson123/signal-lens/action.yml@v2.2.0
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          output-format: all
          output-file: signal-lens-report
          post-comment: "true"
          post-inline-comments: "true"
          apply-labels: "true"
          fail-on-blocker: "true"

      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: signal-lens-report.sarif
          category: signal-lens

      - name: Upload review artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-lens-report
          path: |
            signal-lens-report.md
            signal-lens-report.json
            signal-lens-report.sarif