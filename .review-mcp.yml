version: 1

ai:
  enabled: true
  model: gpt-4o-mini
  perspectives:
    - security
    - architecture
    - correctness

analyzers:
  ci-weakening: true
  duplicate-utility: true
  security-boundary: true
  ai-review: auto

rules:
  architecture:
    - Prefer shared utilities in src/core/ and src/lib/
    - GitHub Actions must use least-privilege permissions
    - Never pass PR body or issue body directly to shell commands

ignore:
  paths:
    - node_modules/**
    - dist/**
    - coverage/**