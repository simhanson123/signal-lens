version: 1

ai:
  enabled: true
  provider: auto
  model: gpt-4o-mini
  perspectives:
    - security
    - architecture
    - correctness
  # Local LLM — no API key required:
  # provider: ollama
  # model: qwen2.5-coder:7b
  # ollama:
  #   baseUrl: http://localhost:11434

analyzers:
  ci-weakening: true
  duplicate-utility: true
  security-boundary: true
  test-coverage: true
  ai-review: auto

rules:
  architecture:
    - Prefer shared utilities in src/core/ and src/lib/
    - GitHub Actions must use least-privilege permissions
    - Never pass PR body or issue body directly to shell commands

ignore:
  paths:
    - node_modules/**
    - dist/**
    - coverage/**