name: signal-lens
description: Context-first maintainer PR review and automation
url: https://github.com/simhanson123/signal-lens
hook_attributes:
  url: https://your-host.example.com/webhook
  active: true
redirect_url: https://github.com/simhanson123/signal-lens
callback_urls:
  - https://your-host.example.com/callback
public: true
default_permissions:
  contents: read
  issues: write
  pull_requests: write
  metadata: read
default_events:
  - pull_request
  - issue_comment